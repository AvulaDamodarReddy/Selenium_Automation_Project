# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
name: Selenium Automation Testing

on:
  push:
    branches: [ "master" ]

  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    # Step 1: Checkout project code
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Setup Java
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Step 3: Install Google Chrome
    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1

    # Step 4: Build Maven Project
    - name: Build Project
      run: mvn clean install

    # Step 5: Execute Selenium Test Cases
    - name: Run Selenium Tests
      run: mvn test

    # Step 6: Upload TestNG Reports
    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      with:
        name: TestNGReports
        path: test-output/

    # Step 7: Upload Screenshots if Failed
    - name: Upload Screenshots
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: FailureScreenshots
        path: screenshots/
